{% extends "base.html" %}

{% block title %}{{ Site.title | default('pyWork') }} - 微博{% endblock %}

{% block head %}
<link rel="stylesheet" href="/static/css/microblog.css">
{% endblock %}

{% block content %}
<div class="microblog-container">
    <div class="microblog-header">
        <h1>{{ Site.microblog_title | default('微博') }}</h1>
        <p class="microblog-description">{{ Site.microblog_description | default('快速分享你的想法') }}</p>
    </div>

    <!-- 发布框 -->
    <div class="compose-box" id="composeBox">
        <div class="compose-avatar" id="composeAvatar">?</div>
        <div class="compose-main">
            <textarea id="composeText" placeholder="有什么想法？" maxlength="500" rows="3"></textarea>
            <div class="compose-footer">
                <span class="char-count"><span id="charCount">0</span>/500</span>
                <button class="btn-send" id="sendBtn" onclick="sendMicroblog()">发布</button>
            </div>
        </div>
    </div>

    <!-- 微博列表 -->
    <div class="feed" id="feed">
        <div class="feed-loading">加载中...</div>
    </div>
</div>

<!-- 编辑弹窗 -->
<div class="edit-modal" id="editModal" style="display:none;">
    <div class="edit-modal-content">
        <h3>编辑微博</h3>
        <textarea id="editText" maxlength="500" rows="4"></textarea>
        <div class="edit-modal-actions">
            <button class="btn-cancel" onclick="closeEditModal()">取消</button>
            <button class="btn-save" onclick="updatePost()">保存</button>
        </div>
    </div>
</div>

<script>
    const currentAuthorId = {{ current_author_id | tojson }};
    let editingPostId = null;
    let currentOffset = 0;
    const pageSize = 20;
    let hasMore = true;
    // 当前页渲染的微博 ID，用于批量查询评论数
    const renderedPostIds = [];

    async function loadFeed(append = false) {
        try {
            const response = await fetch(`/api/microblog?limit=${pageSize + 1}&offset=${currentOffset}`);
            const posts = await response.json();

            hasMore = posts.length > pageSize;
            const displayPosts = posts.slice(0, pageSize);

            const feed = document.getElementById('feed');
            
            if (!append) {
                feed.innerHTML = '';
                renderedPostIds.length = 0;
            }

            if (!append && (!displayPosts || displayPosts.length === 0)) {
                feed.innerHTML = '<div class="feed-empty">还没有微博，快来发布第一条吧</div>';
                document.getElementById('loadMoreBtn')?.remove();
                return;
            }

            const html = displayPosts.map(post => {
                renderedPostIds.push(post.id);
                const avatar = post.author_avatar || post.author_name?.charAt(0).toUpperCase() || '?';
                const time = formatTime(post.created_at);
                const isOwner = post.author_id === currentAuthorId;
                const escapedContent = escapeHtml(post.content || post.body || '');
                return `
                    <div class="post" id="post-${post.id}">
                        <div class="post-avatar">${avatar}</div>
                        <div class="post-body">
                            <div class="post-header">
                                <span class="post-author">${post.author_name || '匿名'}</span>
                                <span class="post-time">${time}</span>
                            </div>
                            <div class="post-content">${escapedContent}</div>
                            <div class="post-actions">
                                ${isOwner ? `<button class="btn-edit" data-content="${escapedContent}" onclick="openEditModal(${post.id})">编辑</button>` : ''}
                                ${isOwner ? `<button class="btn-delete" onclick="deletePost(${post.id})">删除</button>` : ''}
                            </div>
                            <div class="microblog-comments" id="mb-comments-${post.id}"></div>
                        </div>
                    </div>
                `;
            }).join('');
            
            feed.insertAdjacentHTML('beforeend', html);
            
            // 更新加载更多按钮
            let loadMoreBtn = document.getElementById('loadMoreBtn');
            if (hasMore) {
                if (!loadMoreBtn) {
                    loadMoreBtn = document.createElement('button');
                    loadMoreBtn.id = 'loadMoreBtn';
                    loadMoreBtn.className = 'btn-load-more';
                    loadMoreBtn.textContent = '加载更多';
                    loadMoreBtn.onclick = () => {
                        currentOffset += pageSize;
                        loadFeed(true);
                        if (!hasMore) loadMoreBtn.remove();
                    };
                    feed.parentElement.appendChild(loadMoreBtn);
                }
            } else {
                loadMoreBtn?.remove();
            }

            // 自动展开有评论的微博评论区
            autoExpandMicroblogComments();
        } catch (e) {
            document.getElementById('feed').innerHTML = '<div class="feed-error">加载失败</div>';
        }
    }

    async function autoExpandMicroblogComments() {
        if (renderedPostIds.length === 0) return;
        const countResults = await Promise.allSettled(
            renderedPostIds.map(id =>
                fetch(`/api/comments?target_type=microblog&target_id=${id}`)
                    .then(r => r.json())
                    .then(data => ({ id, comments: data.comments || [] }))
                    .catch(() => ({ id, comments: [] }))
            )
        );
        for (const result of countResults) {
            if (result.status !== 'fulfilled') continue;
            const { id, comments } = result.value;
            const container = document.getElementById('mb-comments-' + id);
            if (!container || container.dataset.loaded) continue;
            if (comments.length === 0) continue;
            container.innerHTML = renderMicroblogComments(comments);
            container.dataset.loaded = '1';
        }
    }

    function renderMicroblogComments(comments) {
        if (!comments || comments.length === 0) return '';
        return '<ul class="mb-comment-list">' + comments.map(c => `
            <li class="mb-comment-item">
                <span class="mb-comment-avatar">${c.author_name ? c.author_name.charAt(0).toUpperCase() : '?'}</span>
                <div class="mb-comment-body">
                    <span class="mb-comment-author">${escapeHtml(c.author_name || '匿名')}</span>
                    <span class="mb-comment-time">${formatTimeAgo(c.created_at)}</span>
                    <p class="mb-comment-text">${escapeHtml(c.content)}</p>
                </div>
            </li>
        `).join('') + '</ul>';
    }

    function formatTimeAgo(ts) {
        if (!ts) return '';
        const t = typeof ts === 'number' ? ts * 1000 : new Date(ts).getTime();
        const diff = (Date.now() - t) / 1000;
        if (diff < 60) return '刚刚';
        if (diff < 3600) return Math.floor(diff / 60) + '分钟前';
        if (diff < 86400) return Math.floor(diff / 3600) + '小时前';
        if (diff < 604800) return Math.floor(diff / 86400) + '天前';
        return new Date(t).toLocaleDateString('zh-CN');
    }

    async function sendMicroblog() {
        const textarea = document.getElementById('composeText');
        const content = textarea.value.trim();
        if (!content) {
            alert('请输入内容');
            return;
        }

        const btn = document.getElementById('sendBtn');
        btn.disabled = true;
        btn.textContent = '发布中...';

        try {
            const response = await fetch('/microblog', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: 'content=' + encodeURIComponent(content)
            });
            const result = await response.json();

            if (result.error) {
                alert(result.error);
                btn.disabled = false;
                btn.textContent = '发布';
                return;
            }

            textarea.value = '';
            document.getElementById('charCount').textContent = '0';
            loadFeed();
        } catch (e) {
            alert('发布失败');
        } finally {
            btn.disabled = false;
            btn.textContent = '发布';
        }
    }

    async function deletePost(id) {
        if (!confirm('确定删除这条微博？')) return;
        try {
            const response = await fetch(`/api/microblog/${id}`, { method: 'DELETE' });
            const result = await response.json();
            if (result.error) {
                alert(result.error);
                return;
            }
            const el = document.getElementById(`post-${id}`);
            if (el) el.remove();
        } catch (e) {
            alert('删除失败');
        }
    }

    function openEditModal(postId) {
        editingPostId = postId;
        const btn = document.querySelector(`.btn-edit[data-content][onclick="openEditModal(${postId})"]`);
        const content = btn ? btn.dataset.content : '';
        document.getElementById('editText').value = content;
        document.getElementById('editModal').style.display = 'flex';
    }

    function closeEditModal() {
        editingPostId = null;
        document.getElementById('editModal').style.display = 'none';
    }

    async function updatePost() {
        if (!editingPostId) return;
        const content = document.getElementById('editText').value.trim();
        if (!content) {
            alert('内容不能为空');
            return;
        }

        try {
            const response = await fetch(`/api/microblog/${editingPostId}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ content })
            });
            const result = await response.json();
            if (result.error) {
                alert(result.error);
                return;
            }
            closeEditModal();
            loadFeed();
        } catch (e) {
            alert('保存失败');
        }
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function formatTime(timestamp) {
        if (!timestamp) return '';
        const now = Date.now() / 1000;
        const diff = now - timestamp;
        if (diff < 60) return '刚刚';
        if (diff < 3600) return Math.floor(diff / 60) + '分钟前';
        if (diff < 86400) return Math.floor(diff / 3600) + '小时前';
        if (diff < 604800) return Math.floor(diff / 86400) + '天前';
        return new Date(timestamp * 1000).toLocaleDateString('zh-CN');
    }

    // 字数统计
    document.getElementById('composeText').addEventListener('input', function() {
        document.getElementById('charCount').textContent = this.value.length;
    });

    // Ctrl+Enter 发送
    document.getElementById('composeText').addEventListener('keydown', function(e) {
        if (e.ctrlKey && e.key === 'Enter') sendMicroblog();
    });

    // 加载用户信息
    async function loadUser() {
        try {
            const res = await fetch('/auth/me');
            const user = await res.json();
            if (!user.error) {
                const initial = user.username?.charAt(0).toUpperCase() || '?';
                document.getElementById('composeAvatar').textContent = initial;
            }
        } catch (e) {}
    }

    loadUser();
    loadFeed().then(() => {
        // 锚点滚动：从 URL hash 定位到对应帖子
        if (window.location.hash) {
            const targetId = window.location.hash.substring(1); // 去掉 #
            const targetEl = document.getElementById(targetId);
            if (targetEl) {
                targetEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
                // 高亮效果
                targetEl.style.transition = 'background-color 0.5s';
                targetEl.style.backgroundColor = '#fef3c7';
                setTimeout(() => targetEl.style.backgroundColor = '', 2000);
            }
        }
    });
</script>
{% endblock %}
