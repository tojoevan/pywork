<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pyWork | Precision Balance</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-primary: #111111;
            --text-secondary: #666666;
            --border-color: #e5e5e5;
            --accent-color: #00BCD4;
            --hover-bg: #f5f5f5;
            --font-main: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            --font-mono: "SF Mono", "Fira Code", "Roboto Mono", monospace;
            --font-size: 14px;
        }

        [data-theme="dark"] {
            --bg-color: #0a0a0a;
            --text-primary: #eeeeee;
            --text-secondary: #888888;
            --border-color: #222222;
            --accent-color: #00BCD4;
            --hover-bg: #111111;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-main);
            font-size: var(--font-size);
            background-color: var(--bg-color);
            color: var(--text-primary);
            height: 100vh;
            display: grid;
            grid-template-columns: 280px 1fr;
            overflow: hidden;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* Sidebar */
        .sidebar {
            border-right: 1px solid var(--border-color);
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 32px;
            overflow-y: auto;
        }

        .logo {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 16px;
        }

        .monitor-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .monitor-label {
            font-size: var(--font-size);
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
            font-weight: 600;
        }

        .monitor-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: var(--font-size);
            font-family: var(--font-mono);
        }

        /* Language Switcher */
        .lang-switch {
            margin-top: auto;
            padding-top: 24px;
            border-top: 1px solid var(--border-color);
            cursor: pointer;
            font-size: var(--font-size);
            font-family: var(--font-mono);
            color: var(--text-secondary);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .lang-switch:hover {
            color: var(--accent-color);
        }

        /* Main Content */
        .main-content {
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        .header {
            height: 60px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 32px;
            flex-shrink: 0;
        }

        .header-title {
            font-size: var(--font-size);
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .theme-toggle {
            cursor: pointer;
            font-size: var(--font-size);
            font-family: var(--font-mono);
            color: var(--text-secondary);
        }

        .stream-container {
            flex: 1;
            overflow-y: auto;
            padding: 0;
        }

        .stream-header {
            display: grid;
            grid-template-columns: 80px 80px 1fr 100px;
            padding: 12px 32px;
            border-bottom: 1px solid var(--border-color);
            font-size: var(--font-size);
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
            position: sticky;
            top: 0;
            background: var(--bg-color);
            z-index: 10;
        }

        .stream-header > div:last-child {
            text-align: right;
        }

        .stream-item {
            display: grid;
            grid-template-columns: 80px 80px 1fr 100px;
            padding: 14px 32px;
            border-bottom: 1px solid var(--border-color);
            font-size: var(--font-size);
            align-items: center;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            color: inherit;
            line-height: 1.5;
        }

        .stream-item:hover {
            background-color: var(--hover-bg);
        }

        .stream-item:hover .item-title {
            color: var(--accent-color);
        }

        .item-time {
            font-family: var(--font-mono);
            color: var(--text-secondary);
            font-size: var(--font-size);
        }

        .item-type {
            font-family: var(--font-mono);
            font-size: var(--font-size);
            padding: 2px 6px;
            border: 1px solid var(--border-color);
            border-radius: 2px;
            text-align: center;
            width: fit-content;
        }

        .item-title {
            font-weight: 500;
            font-size: var(--font-size);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .item-status {
            text-align: right;
            font-family: var(--font-mono);
            font-size: var(--font-size);
            color: var(--text-secondary);
        }

        .status-dot {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent-color);
            margin-right: 6px;
        }

        /* Quick Actions */
        .quick-actions {
            position: fixed;
            bottom: 32px;
            right: 32px;
            display: flex;
            gap: 12px;
        }

        .action-btn {
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 10px 20px;
            font-size: var(--font-size);
            font-family: var(--font-mono);
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
        }

        .action-btn:hover {
            border-color: var(--accent-color);
            color: var(--accent-color);
        }

        /* Responsive */
        @media (max-width: 768px) {
            body {
                grid-template-columns: 1fr;
            }

            .sidebar {
                display: none;
            }

            .header {
                padding: 0 16px;
            }

            .stream-header,
            .stream-item {
                grid-template-columns: 60px 60px 1fr 80px;
                padding: 12px 16px;
                font-size: 13px;
            }

            .quick-actions {
                bottom: 16px;
                right: 16px;
                flex-direction: column;
            }

            .action-btn {
                padding: 8px 16px;
                font-size: 13px;
            }
        }

        @media (max-width: 480px) {
            .stream-header,
            .stream-item {
                grid-template-columns: 50px 1fr 70px;
            }

            .item-type {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo">{{ site_title }}</div>

        <div class="monitor-group">
            <div class="monitor-label" data-i18n="sys_status">系统状态</div>
            <div class="monitor-item">
                <span data-i18n="total_posts">博客</span>
                <span>{{ total_posts }}</span>
            </div>
            <div class="monitor-item">
                <span data-i18n="total_microblogs">微博</span>
                <span>{{ total_microblogs }}</span>
            </div>
            <div class="monitor-item">
                <span data-i18n="total_notes">笔记</span>
                <span>{{ total_notes }}</span>
            </div>
        </div>

        <div class="monitor-group">
            <div class="monitor-label" data-i18n="today_focus">待处理</div>
            <div class="monitor-item">
                <span data-i18n="drafts">草稿</span>
                <span style="color: var(--accent-color)">{{ draft_count }}</span>
            </div>
            <div class="monitor-item">
                <span data-i18n="pending">评论</span>
                <span>{{ comment_count }}</span>
            </div>
        </div>

        <div class="monitor-group">
            <div class="monitor-label" data-i18n="metrics">用户</div>
            <div class="monitor-item">
                <span data-i18n="total_users">注册用户</span>
                <span>{{ total_users }}</span>
            </div>
        </div>

        <div class="lang-switch" onclick="toggleLang()">
            <span data-i18n="lang_label">LANGUAGE</span>
            <span id="current-lang">EN / CN</span>
        </div>
    </div>

    <div class="main-content">
        <div class="header">
            <div class="header-title" data-i18n="header_title">DATA STREAM // RECENT ACTIVITY</div>
            <div class="theme-toggle" onclick="toggleTheme()" data-i18n="theme_toggle">LIGHT / DARK</div>
        </div>

        <div class="stream-container">
            <div class="stream-header">
                <div data-i18n="col_time">Time</div>
                <div data-i18n="col_type">Type</div>
                <div data-i18n="col_content">Title / Content</div>
                <div data-i18n="col_status">Status</div>
            </div>

            {{ activity_items }}
        </div>

        <div class="quick-actions">
            <button class="action-btn" data-i18n="btn_weibo">+ New Weibo</button>
            <button class="action-btn" data-i18n="btn_blog">+ Write Blog</button>
            <button class="action-btn" data-i18n="btn_note">+ Add Note</button>
        </div>
    </div>

    <script>
        const i18n = {
            en: {
                sys_status: "Overview",
                total_posts: "Blog",
                total_microblogs: "Weibo",
                total_notes: "Notes",
                today_focus: "Pending",
                drafts: "Drafts",
                pending: "Comments",
                metrics: "Users",
                total_users: "Registered",
                lang_label: "LANGUAGE",
                header_title: "DATA STREAM // RECENT ACTIVITY",
                theme_toggle: "LIGHT / DARK",
                col_time: "Time",
                col_type: "Type",
                col_content: "Title / Content",
                col_status: "Status",
                btn_weibo: "+ New Weibo",
                btn_blog: "+ Write Blog",
                btn_note: "+ Add Note"
            },
            cn: {
                sys_status: "概览",
                total_posts: "博客",
                total_microblogs: "微博",
                total_notes: "笔记",
                today_focus: "待处理",
                drafts: "草稿",
                pending: "评论",
                metrics: "用户",
                total_users: "注册用户",
                lang_label: "语言设置",
                header_title: "数据流 // 最新动态",
                theme_toggle: "浅色 / 深色",
                col_time: "时间",
                col_type: "类型",
                col_content: "标题 / 内容摘要",
                col_status: "状态",
                btn_weibo: "+ 发布微博",
                btn_blog: "+ 撰写博客",
                btn_note: "+ 新建笔记"
            }
        };

        let currentLang = '{{ user_lang | default("cn") }}';

        function applyLang(lang) {
            currentLang = lang;
            document.getElementById('current-lang').textContent = lang === 'en' ? 'EN / CN' : 'CN / EN';

            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (i18n[lang][key]) {
                    el.textContent = i18n[lang][key];
                }
            });

            if (lang === 'cn') {
                document.body.style.setProperty('--font-main', '-apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif');
                document.querySelector('.stream-header').style.letterSpacing = '0.5px';
            } else {
                document.body.style.setProperty('--font-main', '-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif');
                document.querySelector('.stream-header').style.letterSpacing = '1px';
            }
        }

        function toggleLang() {
            const newLang = currentLang === 'en' ? 'cn' : 'en';
            applyLang(newLang);
            fetch('/api/theme/preference', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ theme: 'v7', language: newLang === 'cn' ? 'zh-CN' : 'en-US' })
            }).catch(() => {});
        }

        // 页面加载时应用语言
        applyLang(currentLang);

        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme');
            document.documentElement.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
        }
    </script>
</body>
</html>
