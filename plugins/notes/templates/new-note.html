{% extends "base.html" %}

{% block title %}写笔记 - {{ Site.title | default('pyWork') }}{% endblock %}

{% block head %}
<link rel="stylesheet" href="/static/css/notes.css">
<link rel="stylesheet" href="https://unpkg.com/vditor@3.10.4/dist/index.css" />
{% endblock %}

{% block content %}
<div class="editor-container">
    <div class="editor-header">
        <h1>写笔记</h1>
        <div class="editor-actions">
            <a href="/notes" class="btn btn-secondary">取消</a>
            <button class="btn btn-primary" onclick="saveNote()">保存</button>
        </div>
    </div>

    <input type="text" class="title-input" id="note-title" placeholder="笔记标题" maxlength="200">
    
    <div class="meta-row">
        <div class="visibility-toggle">
            <input type="checkbox" id="note-public">
            <label for="note-public">公开笔记</label>
        </div>
    </div>

    <div id="vditor"></div>

    <div class="status-bar">
        <div class="save-status" id="save-status">
            <span>自动保存已开启</span>
        </div>
        <div class="word-count">
            字数：<span id="word-count">0</span>
        </div>
    </div>
</div>

<!-- Toast 提示 -->
<div class="toast" id="toast"></div>
{% endblock %}

{% block scripts %}
{{ super() }}
<script src="https://unpkg.com/vditor@3.10.4/dist/index.min.js"></script>
<script>
let vditor;
let autoSaveTimer;

function initEditor() {
    vditor = new Vditor('vditor', {
        height: 500,
        placeholder: '开始记录...',
        theme: 'classic',
        counter: { enable: true, after: (count) => { document.getElementById('word-count').textContent = count; } },
        cache: { enable: true, id: 'pywork-note-editor' },
        mode: 'wysiwyg',
        toolbar: ['headings', 'bold', 'italic', 'strike', '|', 'line', 'quote', '|', 'list', 'ordered-list', 'check', '|', 'code', 'inline-code', '|', 'link', 'table', '|', 'undo', 'redo', '|', 'preview', 'fullscreen'],
        after: () => { startAutoSave(); }
    });
}

async function checkAuth() {
    try {
        const response = await fetch('/auth/me');
        const user = await response.json();
        if (user.error) { window.location.href = '/login'; return false; }
        return true;
    } catch (e) {
        window.location.href = '/login';
        return false;
    }
}

async function saveNote() {
    const title = document.getElementById('note-title').value.trim();
    const content = vditor.getValue();
    const isPublic = document.getElementById('note-public').checked;
    const visibility = isPublic ? 'public' : 'private';

    if (!title) { showToast('请输入标题', 'error'); return; }
    if (!content) { showToast('请输入内容', 'error'); return; }

    const statusEl = document.getElementById('save-status');
    statusEl.className = 'save-status saving';
    statusEl.innerHTML = '<span>保存中...</span>';

    try {
        const response = await fetch('/notes', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: 'title=' + encodeURIComponent(title) + 
                  '&content=' + encodeURIComponent(content) + 
                  '&visibility=' + visibility
        });
        const result = await response.json();

        if (result.id) {
            showToast('保存成功！', 'success');
            statusEl.className = 'save-status saved';
            statusEl.innerHTML = '<span>✓ 已保存</span>';
            localStorage.removeItem('pywork-note-draft');
            setTimeout(() => { window.location.href = '/notes/' + result.id; }, 1000);
        } else {
            showToast(result.error || '保存失败', 'error');
            statusEl.innerHTML = '<span>保存失败</span>';
        }
    } catch (e) {
        showToast('保存失败，请重试', 'error');
        statusEl.innerHTML = '<span>保存失败</span>';
    }
}

function startAutoSave() {
    autoSaveTimer = setInterval(() => {
        const title = document.getElementById('note-title').value.trim();
        const content = vditor.getValue();
        if (title || content) {
            localStorage.setItem('pywork-note-draft', JSON.stringify({
                title, content,
                isPublic: document.getElementById('note-public').checked,
                savedAt: new Date().toISOString()
            }));
            const statusEl = document.getElementById('save-status');
            statusEl.className = 'save-status saved';
            statusEl.innerHTML = '<span>✓ 已自动保存</span>';
        }
    }, 30000);
}

function loadDraft() {
    const draft = localStorage.getItem('pywork-note-draft');
    if (!draft) return;
    try {
        const data = JSON.parse(draft);
        if (data.title) document.getElementById('note-title').value = data.title;
        if (data.isPublic !== undefined) document.getElementById('note-public').checked = data.isPublic;
        if (data.content) vditor.setValue(data.content);
    } catch (e) { console.error('加载草稿失败', e); }
}

function showToast(message, type = '') {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.className = 'toast show ' + type;
    setTimeout(() => { toast.className = 'toast'; }, 3000);
}

async function init() {
    const loggedIn = await checkAuth();
    if (loggedIn) {
        initEditor();
        setTimeout(loadDraft, 500);
    }
}

init();
</script>
{% endblock %}
