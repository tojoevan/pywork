<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - {{ Site.title | default('pyWork') }}</title>
    <link rel="stylesheet" href="/static/css/auth.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <!-- Logo -->
        <a href="/" class="auth-logo">pyWork</a>
        
        <!-- 注册表单 -->
        <div class="auth-card">
            <h1 class="auth-title">创建账号</h1>
            <p class="auth-subtitle">加入社区，分享知识</p>
            
            <form action="/auth/register" method="post" class="auth-form">
                <div class="form-group">
                    <label for="username">用户名</label>
                    <input type="text" id="username" name="username" required
                           placeholder="请输入用户名" autocomplete="username">
                    <span class="form-hint">字母、数字、下划线，4-20字符</span>
                </div>
                
                <div class="form-group">
                    <label for="email">邮箱</label>
                    <input type="email" id="email" name="email"required
                           placeholder="请输入邮箱" autocomplete="email">
                </div>
                
                <div class="form-group">
                    <label for="password">密码</label>
                    <input type="password" id="password" name="password" required
                           placeholder="请输入密码" autocomplete="new-password">
                    <span class="form-hint">至少8位，包含字母和数字</span>
                </div>
                
                <div class="form-group">
                    <label for="password_confirm">确认密码</label>
                    <input type="password" id="password_confirm" name="password_confirm" required
                           placeholder="请再次输入密码" autocomplete="new-password">
                </div>
                
                <div class="form-options">
                    <label class="checkbox">
                        <input type="checkbox" name="agree" required>
                        <span>我已阅读并同意<a href="/terms">服务条款</a></span>
                    </label>
                </div>
                
                <button type="submit" class="btn-primary">注册</button>
            </form>
            
            <div class="auth-footer">
                <p>已有账号？<a href="/auth/login">立即登录</a></p>
            </div>
        </div>
    </div>
</body>
</html>
