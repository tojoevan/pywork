<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - {{ Site.title | default('pyWork') }}</title>
    <link rel="stylesheet" href="/static/css/auth.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <!-- 登录表单 -->
        <div class="auth-card">
            <h1 class="auth-title"><a href="/" class="logo-text">{{ Site.logo_text | default('pyWork') }}</a> 登录</h1>
            <p class="auth-subtitle">欢迎回来</p>
            
            <form action="/auth/login" method="post" class="auth-form inline-form">
                <div class="form-row inline-row">
                    <label for="username">用户名</label>
                    <input type="text" id="username" name="username" required
                           placeholder="请输入用户名" autocomplete="username">
                </div>
                
                <div class="form-row inline-row">
                    <label for="password">密码</label>
                    <input type="password" id="password" name="password" required
                           placeholder="请输入密码" autocomplete="current-password">
                </div>
                
                <div class="form-options inline-options">
                    <div class="checkbox-spacer"></div>
                    <label class="checkbox">
                        <input type="checkbox" name="remember">
                        <span>记住我</span>
                    </label>
                </div>
                
                <button type="submit" class="btn-primary">登录</button>
            </form>
            
            <div class="auth-footer">
                <p>还没有账号？<a href="/register">立即注册</a></p>
            </div>
        </div>
        
        <!-- 社交登录 -->
        <div class="social-auth">
            <p class="divider"><span>或</span></p>
            <div class="social-buttons">
                <a href="/auth/github" class="btn-social">GitHub</a>
                <a href="/auth/google" class="btn-social">Google</a>
            </div>
        </div>
    </div>
</body>
</html>
