{% extends "base.html" %}

{% block title %}网站设置 - {{ Site.title | default('pyWork') }}{% endblock %}

{% block head %}
<link rel="stylesheet" href="/static/css/board.css">
<style>
.settings-form {
    max-width: 600px;
    background: white;
    border: 1px solid var(--border-color);
    border-radius: 0.5rem;
    padding: 1.5rem;
}
.form-group {
    margin-bottom: 1.25rem;
}
.form-group label {
    display: block;
    font-weight: 500;
    margin-bottom: 0.5rem;
    color: var(--text-color);
}
.form-group input[type="text"],
.form-group input[type="color"] {
    width: 100%;
    padding: 0.625rem 0.75rem;
    border: 1px solid var(--border-color);
    border-radius: 0.375rem;
    font-size: 0.9375rem;
    box-sizing: border-box;
}
.form-group input[type="color"] {
    height: 40px;
    cursor: pointer;
}
.form-group .hint {
    font-size: 0.8125rem;
    color: #6b7280;
    margin-top: 0.375rem;
}
.btn-save {
    padding: 0.625rem 1.25rem;
    background: var(--primary-color, #10b981);
    color: white;
    border: none;
    border-radius: 0.375rem;
    font-size: 0.9375rem;
    font-weight: 500;
    cursor: pointer;
}
.btn-save:hover {
    opacity: 0.9;
}
.btn-save:disabled {
    opacity: 0.5;
    cursor: not-allowed;
}
.save-status {
    margin-left: 1rem;
    font-size: 0.875rem;
}
.save-status.success { color: #10b981; }
.save-status.error { color: #ef4444; }
</style>
{% endblock %}

{% block content %}
<div class="board-container">

    <div class="board-header">
        <h1>⚙️ 网站设置</h1>
        <p class="board-desc">修改网站基本信息，仅管理员可用</p>
        <div class="tab-nav">
            <a href="/board" class="tab-btn">看板</a>
            <a href="/board/cron" class="tab-btn">定时任务</a>
            <a href="/board/moderation" class="tab-btn">微博审核</a>
            <a href="/board/settings" class="tab-btn active">网站设置</a>
        </div>
    </div>

    <form class="settings-form" id="settingsForm">
        <div class="form-group">
            <label for="title">网站标题</label>
            <input type="text" id="title" name="title" placeholder="pyWork">
            <div class="hint">浏览器标签页显示的标题</div>
        </div>

        <div class="form-group">
            <label for="logo_text">顶部 Logo 文字</label>
            <input type="text" id="logo_text" name="logo_text" placeholder="pyWork">
            <div class="hint">导航栏左上角显示的文字</div>
        </div>

        <div class="form-group">
            <label for="footer_text">页脚文字</label>
            <input type="text" id="footer_text" name="footer_text" placeholder="© 2026 pyWork. All rights reserved.">
            <div class="hint">页面底部版权信息</div>
        </div>

        <div class="form-group">
            <label for="description">网站描述</label>
            <input type="text" id="description" name="description" placeholder="多用户数字工作台">
            <div class="hint">SEO 描述，也用于首页 meta</div>
        </div>

        <div class="form-group">
            <label for="primary_color">主题色</label>
            <input type="color" id="primary_color" name="primary_color" value="#10b981">
            <div class="hint">按钮、链接等主色调</div>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn-save" id="saveBtn">保存设置</button>
            <span class="save-status" id="saveStatus"></span>
        </div>
    </form>

</div>

<script>
// 加载当前设置
async function loadSettings() {
    try {
        const res = await fetch('/board/settings/api');
        const data = await res.json();
        document.getElementById('title').value = data.title || '';
        document.getElementById('logo_text').value = data.logo_text || '';
        document.getElementById('footer_text').value = data.footer_text || '';
        document.getElementById('description').value = data.description || '';
        document.getElementById('primary_color').value = data.primary_color || '#10b981';
    } catch (e) {
        console.error('加载设置失败:', e);
    }
}

// 保存设置
document.getElementById('settingsForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('saveBtn');
    const status = document.getElementById('saveStatus');
    
    btn.disabled = true;
    status.textContent = '保存中...';
    status.className = 'save-status';

    const data = {
        title: document.getElementById('title').value,
        logo_text: document.getElementById('logo_text').value,
        footer_text: document.getElementById('footer_text').value,
        description: document.getElementById('description').value,
        primary_color: document.getElementById('primary_color').value,
    };

    try {
        const res = await fetch('/board/settings/api', {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });
        const result = await res.json();
        if (result.success) {
            status.textContent = '保存成功！刷新页面后生效';
            status.className = 'save-status success';
        } else {
            status.textContent = '保存失败';
            status.className = 'save-status error';
        }
    } catch (e) {
        status.textContent = '保存失败: ' + e.message;
        status.className = 'save-status error';
    } finally {
        btn.disabled = false;
    }
});

// 页面加载时读取设置
loadSettings();
</script>
{% endblock %}
