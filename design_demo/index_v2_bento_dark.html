<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pyWork | 个人工作台</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f1011;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-primary: #f7f8f8;
            --text-secondary: #d0d6e0;
            --accent-cyan: #00bcd4;
            --accent-glow: rgba(0, 188, 212, 0.15);
            --font-main: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: var(--font-main);
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(0, 188, 212, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(0, 188, 212, 0.03) 0%, transparent 40%);
        }

        .dashboard-container {
            width: 100%;
            max-width: 1100px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-auto-rows: minmax(180px, auto);
            gap: 20px;
        }

        /* Bento Grid Cards */
        .bento-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 28px;
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            display: flex;
            flex-direction: column;
        }

        .bento-card:hover {
            transform: translateY(-4px);
            border-color: rgba(255, 255, 255, 0.15);
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.5), 0 0 20px var(--accent-glow);
        }

        /* Card Sizes */
        .span-2 { grid-column: span 2; }
        .span-4 { grid-column: span 4; }
        .row-2 { grid-row: span 2; }

        /* Typography & Elements */
        h2 { font-size: 1.25rem; font-weight: 500; letter-spacing: -0.02em; margin-bottom: 8px; }
        p { color: var(--text-secondary); font-size: 0.9rem; }
        
        .icon-box {
            width: 48px; height: 48px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 20px;
            font-size: 1.5rem;
        }

        /* Action Buttons */
        .action-btn {
            margin-top: auto;
            padding: 12px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-primary);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: 0.3s;
        }
        .action-btn:hover { background: var(--accent-cyan); color: #000; border-color: var(--accent-cyan); }

        /* Stats Mini-Chart */
        .stats-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px;
        }
        .stat-item h3 { font-size: 1.8rem; font-weight: 600; letter-spacing: -0.03em; }
        .stat-label { font-size: 0.8rem; color: var(--text-secondary); }

        /* Content List */
        .content-list { list-style: none; margin-top: 15px; }
        .content-item {
            padding: 12px 0;
            border-bottom: 1px solid var(--border-color);
            display: flex; justify-content: space-between; align-items: center;
        }
        .content-item:last-child { border-bottom: none; }
        .tag { font-size: 0.7rem; padding: 2px 8px; border-radius: 20px; background: rgba(0, 188, 212, 0.1); color: var(--accent-cyan); }

        /* Responsive */
        @media (max-width: 768px) {
            .dashboard-container { grid-template-columns: 1fr; }
            .span-2, .span-4 { grid-column: span 1; }
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <!-- Welcome / Profile -->
        <div class="bento-card span-2">
            <div class="icon-box">👋</div>
            <h2>下午好，赵诤</h2>
            <p>这里是你的内容创作中心。今天想记录点什么？</p>
        </div>

        <!-- Quick Actions -->
        <div class="bento-card">
            <div class="icon-box">✍️</div>
            <h2>写博客</h2>
            <a href="#" class="action-btn">开始撰写 →</a>
        </div>

        <div class="bento-card">
            <div class="icon-box">⚡</div>
            <h2>发微博</h2>
            <a href="#" class="action-btn">发布动态 →</a>
        </div>

        <!-- Analytics -->
        <div class="bento-card row-2">
            <h2>本周数据</h2>
            <div class="stats-grid">
                <div class="stat-item">
                    <h3 style="color: var(--accent-cyan)">12</h3>
                    <div class="stat-label">新笔记</div>
                </div>
                <div class="stat-item">
                    <h3>842</h3>
                    <div class="stat-label">阅读量</div>
                </div>
            </div>
            <div style="margin-top: 20px; height: 100px; background: linear-gradient(to top, rgba(0,188,212,0.1), transparent); border-radius: 12px;"></div>
        </div>

        <!-- Recent Notes -->
        <div class="bento-card span-2 row-2">
            <h2>最近笔记</h2>
            <ul class="content-list">
                <li class="content-item">
                    <span>关于极简设计的思考</span>
                    <span class="tag">设计</span>
                </li>
                <li class="content-item">
                    <span>pyWork 架构重构计划</span>
                    <span class="tag">开发</span>
                </li>
                <li class="content-item">
                    <span>2026 Q1 目标回顾</span>
                    <span class="tag">生活</span>
                </li>
                <li class="content-item">
                    <span>高效工作流工具推荐</span>
                    <span class="tag">效率</span>
                </li>
            </ul>
            <a href="#" class="action-btn" style="width: fit-content;">查看全部</a>
        </div>

        <!-- Weather / Status -->
        <div class="bento-card">
            <h2>系统状态</h2>
            <p style="margin-top: 10px; font-size: 0.8rem;">所有服务运行正常</p>
            <div style="margin-top: auto; height: 4px; background: #27a644; border-radius: 2px;"></div>
        </div>

        <!-- Search -->
        <div class="bento-card">
            <h2>全局搜索</h2>
            <div style="margin-top: 15px; padding: 10px; border: 1px dashed var(--border-color); border-radius: 8px; color: var(--text-secondary); font-size: 0.8rem;">
                Cmd + K
            </div>
        </div>
    </div>

</body>
</html>
