<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pyWork - Intelligent Workspace</title>
    <style>
        :root {
            --bg-color: #f5f5f7;
            --text-primary: #1d1d1f;
            --text-secondary: #86868b;
            --accent-cyan: #00bcd4;
            --card-bg: rgba(255, 255, 255, 0.8);
            --border-color: rgba(0, 0, 0, 0.1);
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        [data-theme="dark"] {
            --bg-color: #000000;
            --text-primary: #f5f5f7;
            --text-secondary: #a1a1a6;
            --card-bg: rgba(28, 28, 30, 0.6);
            --border-color: rgba(255, 255, 255, 0.1);
            --shadow: 0 10px 40px rgba(0, 188, 212, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background-color 0.5s ease;
        }

        /* 动态背景光晕 */
        .ambient-light {
            position: absolute;
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle, rgba(0, 188, 212, 0.15) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
            pointer-events: none;
            animation: pulse 8s infinite alternate;
        }

        @keyframes pulse {
            0% { opacity: 0.5; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0.8; transform: translate(-50%, -50%) scale(1.1); }
        }

        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            max-width: 1200px;
            width: 100%;
            padding: 0 40px;
        }

        .hero-title {
            font-size: clamp(3rem, 8vw, 6rem);
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 20px;
            background: linear-gradient(135deg, var(--text-primary) 0%, var(--text-secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-subtitle {
            font-size: clamp(1.2rem, 3vw, 1.8rem);
            color: var(--text-secondary);
            font-weight: 400;
            margin-bottom: 60px;
            letter-spacing: 0.05em;
        }

        .grid-menu {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            margin-top: 40px;
        }

        .menu-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 40px 30px;
            cursor: pointer;
            transition: var(--transition);
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: var(--shadow);
        }

        .menu-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 50px rgba(0, 188, 212, 0.2);
            border-color: var(--accent-cyan);
        }

        .card-icon {
            font-size: 3rem;
            margin-bottom: 20px;
            color: var(--accent-cyan);
        }

        .card-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .card-desc {
            font-size: 0.95rem;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        .controls {
            position: fixed;
            bottom: 40px;
            right: 40px;
            display: flex;
            gap: 15px;
            z-index: 10;
        }

        .btn-control {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            transition: var(--transition);
            backdrop-filter: blur(10px);
        }

        .btn-control:hover {
            background: var(--accent-cyan);
            color: white;
            border-color: var(--accent-cyan);
        }

        @media (max-width: 768px) {
            .grid-menu { grid-template-columns: 1fr; }
            .hero-title { font-size: 3rem; }
        }
    </style>
</head>
<body>
    <div class="ambient-light"></div>
    
    <div class="container">
        <h1 class="hero-title" data-i18n="title">智能工作平台</h1>
        <p class="hero-subtitle" data-i18n="subtitle">让效率触手可及，让创作自由流动</p>

        <div class="grid-menu">
            <a href="/microblog" class="menu-card">
                <div class="card-icon">✦</div>
                <div class="card-title" data-i18n="microblog_title">微博</div>
                <div class="card-desc" data-i18n="microblog_desc">捕捉灵感瞬间，分享生活点滴</div>
            </a>
            <a href="/blog" class="menu-card">
                <div class="card-icon">◈</div>
                <div class="card-title" data-i18n="blog_title">博客</div>
                <div class="card-desc" data-i18n="blog_desc">深度思考记录，构建知识体系</div>
            </a>
            <a href="/notes" class="menu-card">
                <div class="card-icon">▣</div>
                <div class="card-title" data-i18n="notes_title">笔记</div>
                <div class="card-desc" data-i18n="notes_desc">结构化信息管理，高效协作</div>
            </a>
        </div>
    </div>

    <div class="controls">
        <button class="btn-control" id="lang-toggle">CN / EN</button>
        <button class="btn-control" id="theme-toggle">◐</button>
    </div>

    <script>
        const i18n = {
            zh: {
                title: "智能工作平台",
                subtitle: "让效率触手可及，让创作自由流动",
                microblog_title: "微博",
                microblog_desc: "捕捉灵感瞬间，分享生活点滴",
                blog_title: "博客",
                blog_desc: "深度思考记录，构建知识体系",
                notes_title: "笔记",
                notes_desc: "结构化信息管理，高效协作"
            },
            en: {
                title: "Intelligent Workspace",
                subtitle: "Efficiency at your fingertips, creativity in flow",
                microblog_title: "Microblog",
                microblog_desc: "Capture moments, share life snippets",
                blog_title: "Blog",
                blog_desc: "Record deep thoughts, build knowledge systems",
                notes_title: "Notes",
                notes_desc: "Structured information management for efficiency"
            }
        };

        let currentLang = 'zh';
        let currentTheme = 'light';

        function updateContent() {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (i18n[currentLang][key]) {
                    el.textContent = i18n[currentLang][key];
                }
            });
            document.getElementById('lang-toggle').textContent = currentLang === 'zh' ? 'CN / EN' : 'EN / CN';
        }

        document.getElementById('lang-toggle').addEventListener('click', () => {
            currentLang = currentLang === 'zh' ? 'en' : 'zh';
            updateContent();
        });

        document.getElementById('theme-toggle').addEventListener('click', () => {
            currentTheme = currentTheme === 'light' ? 'dark' : 'light';
            document.body.setAttribute('data-theme', currentTheme);
        });

        // 初始化
        updateContent();
    </script>
</body>
</html>
