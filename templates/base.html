<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ Site.title | default('pyWork') }}{% endblock %}</title>
    
    <!-- 静态资源 -->
    <link rel="stylesheet" href="/static/css/base.css?v=20260423">
    <link rel="stylesheet" href="/static/css/home.css?v=20260423">
    {% block head %}{% endblock %}
    
    <!-- 站点配置 -->
    <style>
        :root {
            --primary-color: {{ Site.primary_color | default('#3b82f6') }};
            --bg-color: {{ Site.bg_color | default('#ffffff') }};
            --text-color: {{ Site.text_color | default('#1f2937') }};
            --border-color: {{ Site.border_color | default('#e5e7eb') }};
        }
    </style>
</head>
<body class="{{ body_class | default('') }}">
    <!-- 顶部导航 -->
    <header class="topbar">
        <div class="container">
            <a href="/" class="brand">{{ Site.logo_text | default(Site.title) | default('pyWork') }}</a>
            <button class="menu-toggle" id="menu-toggle" aria-label="菜单">
                <span class="hamburger"></span>
            </button>
            <nav class="nav" id="nav-menu">
                <a href="/" {% if nav_page=='home' %}class="active"{% endif %}>首页</a>
                <a href="/blog" {% if nav_page=='blog' %}class="active"{% endif %}>博客</a>
                <a href="/microblog" {% if nav_page=='microblog' %}class="active"{% endif %}>微博</a>
                <a href="/notes" {% if nav_page=='notes' %}class="active"{% endif %}>笔记</a>
                <a href="/about" {% if nav_page=='about' %}class="active"{% endif %}>关于</a>
                <form class="nav-search-mobile" action="/search" method="GET">
                    <input type="search" name="q" placeholder="搜索..." aria-label="搜索">
                    <button type="submit">🔍</button>
                </form>
            </nav>
            <form class="search-form" action="/search" method="GET">
                <input type="search" name="q" class="search-input" placeholder="搜索..." aria-label="全局搜索">
                <button type="submit" class="search-btn" aria-label="搜索">🔍</button>
            </form>
            <div class="actions">
                <span id="user-info" style="display:none; visibility:hidden;">
                    <a href="/profile" class="user-link">
                        <span class="user-avatar" id="user-avatar">U</span>
                        <span id="username-display">用户</span>
                    </a>
                    <a href="#" class="btn-logout" onclick="logout()">退出</a>
                </span>
                <a href="/login" class="btn-login" id="login-btn" style="visibility:hidden;">登录</a>
            </div>
        </div>
    </header>

    <!-- 主内容区 -->
    <main class="main-content">
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </main>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="container">
            <p>{{ Site.footer_text | safe if Site.footer_text else '© 2026 pyWork. All rights reserved.' }}</p>
        </div>
    </footer>

    <!-- 脚本 -->
    <script src="/static/js/base.js"></script>
    <script>
        // 检查登录状态（Cookie 自动附加）
        async function checkAuth() {
            try {
                const response = await fetch('/auth/me');
                
                if (!response.ok) {
                    // 未登录（401），显示登录按钮
                    document.getElementById('login-btn').style.display = 'inline-flex';
                    document.getElementById('login-btn').style.visibility = 'visible';
                    return;
                }
                
                const user = await response.json();

                if (!user.error) {
                    // 已登录，显示用户信息
                    document.getElementById('user-info').style.display = 'inline-flex';
                    document.getElementById('user-info').style.visibility = 'visible';
                    document.getElementById('login-btn').style.display = 'none';
                    document.getElementById('username-display').textContent = user.username;
                    document.getElementById('user-avatar').textContent = user.username.charAt(0).toUpperCase();
                } else {
                    // 未登录，显示登录按钮
                    document.getElementById('login-btn').style.display = 'inline-flex';
                    document.getElementById('login-btn').style.visibility = 'visible';
                }
            } catch (e) {
                console.error('检查登录状态失败', e);
            }
        }

        async function logout() {
            await fetch('/auth/logout', { method: 'POST' });
            window.location.reload();
        }

        checkAuth();
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
